# 小希-Mesh v2 消息中转服务 配置文件
server:
  host: "0.0.0.0"
  ws_port: 8765
  http_port: 8766

auth:
  secret_key: "default-dev-key-only"  # 生产环境请通过 MESH_SECRET_KEY 环境变量设置
  token_expire_hours: 72
  refresh_token_expire_days: 30

storage:
  db_path: "data/messenger.db"

limits:
  max_message_size: 1048576  # 1MB
  max_connections: 50
  heartbeat_interval: 30
  heartbeat_timeout: 90

admin:
  username: "admin"
  # 默认密码: admin123 (首次启动后请修改)
  password_hash: "$2b$12$VGRq9DX8Jw8dokioW7tJTetI749JcrRGMbevydnIsDuLqdHhwp9aS"

# v2: 协作引擎配置
collaboration:
  # 任务路由评分权重
  scoring:
    capability_weight: 50   # 能力匹配
    keyword_weight: 30      # 关键词匹配
    specialty_weight: 10    # 专长匹配
    online_bonus: 5         # 在线时长奖励
  # 自动路由开关
  auto_route: true
  # 任务超时（秒）
  task_timeout: 3600

# v2: 权限配置
permissions:
  roles:
    admin:
      message: [send, receive, broadcast]
      file: [upload, download, delete]
      command: [execute, manage]
      task: [create, delegate, manage, complete, delete]
      agent: [register, manage, delete]
      admin: [manage, config, audit]
      token: [create, revoke, list]
    agent:
      message: [send, receive]
      file: [upload, download]
      command: [execute]
      task: [create, complete, delegate]
      agent: [list]
      token: [list]
    external:
      message: [receive]
      file: [download]
      task: [list]
      agent: [list]
    readonly:
      message: [receive]
      file: [download]
      task: [list]
      agent: [list]

# 智能管理员配置
agent_brain:
  enabled: true
  provider: "mimo"
  model: "mimo-v2-omni"
  api_key_file: "/home/caowei/桌面/hermes中转/apikey/mimo_mesh.txt"
  system_prompt: |
    你是MESH智能管理员，负责分析用户消息并决定由哪个智能体处理。

    可用的智能体列表：
    {agents_info}

    决策规则：
    - 编程、桌面自动化、本地操作、微信操作、文件管理 -> 小青
    - 服务器运维、网络监控、阿里云相关 -> 小蓝
    - QQ操作、文件下载、下载管理、新云服务器相关 -> 小白
    - 如果只是简单问候、确认、感谢、闲聊等不需要特定技能的消息 -> 直接回复

    输出格式（必须是纯 JSON，不要多余文字）：
    1. 如果需要转发给某个智能体：{{"action": "forward", "target_agent": "xiaoqing", "reason": "决策理由"}}
    2. 如果可以直接回复：{{"action": "reply", "reply_content": "你的回复内容", "reason": "决策理由"}}
    3. 如果出错或不明确：{{"action": "error", "reply_content": "错误说明", "reason": "出错原因"}}

    注意：target_agent 必须是 xiaoqing、xiaolan、xiaobai 之一。

# v2: 审计配置
audit:
  # 频率限制窗口（秒）
  rate_limit_window: 60
  # 窗口内最大操作次数
  rate_limit_max: 100
  # 日志保留天数
  retention_days: 90

# v2: Web 管理界面配置
web:
  enabled: true
  path: "/web/"
  # 静态文件目录（如果需要自定义）
  static_dir: ""
